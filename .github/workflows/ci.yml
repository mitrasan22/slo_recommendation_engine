name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/slo-api
  IMAGE_UI: ghcr.io/${{ github.repository }}/slo-ui

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: slo_user
          POSTGRES_PASSWORD: slo_pass
          POSTGRES_DB: slo_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U slo_user -d slo_db"
          --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: python -m ruff check src/ api/ tests/

      - name: Type check (mypy)
        run: python -m mypy src/slo_engine/ --ignore-missing-imports --no-error-summary

      - name: Run tests
        env:
          POSTGRES_DSN: postgresql+asyncpg://slo_user:slo_pass@localhost:5432/slo_db
          REDIS_DSN: redis://localhost:6379/0
          ENVIRONMENT: test
        run: python -m pytest tests/ -v --tb=short -q

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (UI)
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_UI }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Set image tags to current SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          kubectl set image deployment/slo-api \
            slo-api=${{ env.IMAGE_API }}:sha-${SHORT_SHA} \
            -n slo-engine
          kubectl set image deployment/slo-ui \
            slo-ui=${{ env.IMAGE_UI }}:sha-${SHORT_SHA} \
            -n slo-engine

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/slo-api -n slo-engine --timeout=300s
          kubectl rollout status deployment/slo-ui -n slo-engine --timeout=120s

      - name: Smoke test
        run: |
          API_URL=$(kubectl get ingress slo-api-ingress -n slo-engine \
            -o jsonpath='{.spec.rules[0].host}')
          curl -sf "https://${API_URL}/api/v1/health" | grep '"status":"ok"'
