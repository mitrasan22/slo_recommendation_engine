apiVersion: apps/v1
kind: Deployment
metadata:
  name: slo-ui
  namespace: slo-engine
  labels:
    app: slo-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slo-ui
  template:
    metadata:
      labels:
        app: slo-ui
    spec:
      containers:
        - name: slo-ui
          image: slo-engine/ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          env:
            - name: API_BASE_URL
              value: "http://slo-api-service/api/v1"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
