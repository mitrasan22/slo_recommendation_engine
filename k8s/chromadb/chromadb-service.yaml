apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: slo-engine
  labels:
    app: chromadb
spec:
  selector:
    app: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP           # internal only — not exposed outside the cluster
